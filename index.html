<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>study grammar and vocabulary for baby</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#000;color:white;overflow-x:hidden}

/* ===== BLACK HOLE BACKGROUND ===== */
.blackhole{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
width:750px;height:750px;border-radius:50%;
background:radial-gradient(circle at center,#000 25%,#14002b 45%,#3b0764 60%,#000 75%);
box-shadow:0 0 150px #7c3aed,0 0 300px #06b6d4;
animation:spin 60s linear infinite;z-index:-2}
@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0)}
to{transform:translate(-50%,-50%) rotate(360deg)}
}

.stars{
position:fixed;width:100%;height:100%;
background:transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
animation:moveStars 300s linear infinite;z-index:-3
}

@keyframes moveStars{
from{background-position:0 0}
to{background-position:-15000px 8000px}
}

header{text-align:center;padding:30px}

header h1{
font-size:40px;
background:linear-gradient(90deg,#a855f7,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}

.dashboard{
display:flex;
justify-content:center;
gap:25px;
margin-top:15px;
font-size:14px
}

.progress{
height:10px;
background:#111;
border-radius:10px;
margin-top:10px;
width:300px;
margin:auto
}

.progress-bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#ef4444,#facc15,#22c55e);
border-radius:10px;
transition:1s linear
}

.container{
width:95%;
max-width:1000px;
margin:30px auto;
background:rgba(10,10,10,0.95);
padding:40px;
border-radius:30px;
box-shadow:0 0 50px rgba(124,58,237,0.5)
}

.question{
font-size:22px;
margin-bottom:25px;
text-align:center
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px
}

.answer-btn{
padding:18px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:15px;
color:white;
transition:0.3s
}

.answer-btn:nth-child(1){background:#ef4444}
.answer-btn:nth-child(2){background:#3b82f6}
.answer-btn:nth-child(3){background:#22c55e}
.answer-btn:nth-child(4){background:#eab308}

.answer-btn:hover{
transform:scale(1.05)
}

.mode-selector{
text-align:center;
margin-bottom:25px
}

.mode-selector button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7c3aed,#06b6d4);
color:white;
cursor:pointer
}

footer{
text-align:center;
margin:40px 0;
font-size:12px;
opacity:0.6
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="blackhole"></div>

<header>
<h1>🌌 Study Grammar and Vocabulary</h1>

<div class="dashboard">
<div>Score: <span id="score">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Question: <span id="qNumber">1</span>/10</div>
</div>

<div class="progress">
<div class="progress-bar" id="timerBar"></div>
</div>
</header>

<div class="container">

<div class="mode-selector">
<button onclick="setMode('grammar')">Grammar Mode</button>
<button onclick="setMode('vocab')">Vocabulary Mode</button>
</div>

<div class="question" id="question">
Choose mode to start mission...
</div>

<div class="answers" id="answers"></div>

</div>

<footer>
made by:
JAWSYAN KABIR KANZA
2505181047
</footer>

<script>

/* ================= VOCABULARY ================= */

const vocabulary=[
{word:"Galaxy",meaning:"Galaksi"},
{word:"Planet",meaning:"Planet"},
{word:"Star",meaning:"Bintang"},
{word:"Moon",meaning:"Bulan"},
{word:"Sun",meaning:"Matahari"},
{word:"Rocket",meaning:"Roket"},
{word:"Astronaut",meaning:"Astronot"},
{word:"Discover",meaning:"Menemukan"},
{word:"Explore",meaning:"Menjelajahi"},
{word:"Bright",meaning:"Cerah"}
];

/* ================= GRAMMAR QUESTIONS ================= */

const grammarQuestions=[
{
question:"She ____ to school every day.",
options:["go","goes","going","gone"],
answer:"goes"
},
{
question:"They ____ watching a movie now.",
options:["is","are","was","be"],
answer:"are"
},
{
question:"I have lived here ____ 2015.",
options:["for","since","from","at"],
answer:"since"
},
{
question:"He ____ finished his homework.",
options:["has","have","had","is"],
answer:"has"
},
{
question:"If it rains, we ____ stay home.",
options:["will","would","are","were"],
answer:"will"
},
{
question:"She is ____ than her sister.",
options:["tall","taller","tallest","more tall"],
answer:"taller"
},
{
question:"This is the ____ movie I have ever seen.",
options:["good","better","best","well"],
answer:"best"
},
{
question:"There ____ many stars in the sky.",
options:["is","are","was","be"],
answer:"are"
},
{
question:"My father ____ coffee every morning.",
options:["drink","drinks","drinking","drank"],
answer:"drinks"
},
{
question:"We ____ football yesterday.",
options:["play","plays","played","playing"],
answer:"played"
}
];

let mode=null;
let score=0;
let level=1;
let questionCount=0;
let timer;
let timeLeft=15;

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function setMode(selected){
mode=selected;
score=0;
level=1;
questionCount=0;

document.getElementById("score").innerText=0;
document.getElementById("level").innerText=1;

nextQuestion();
}

function nextQuestion(){

/* ===== TOTAL QUESTION 10 ===== */

if(questionCount>=10){
alert("Mission Completed! Score: "+score);
location.reload();
return;
}

questionCount++;

document.getElementById("qNumber").innerText=questionCount;

let correct,options,questionText;

if(mode==='vocab'){

const current=vocabulary[Math.floor(Math.random()*vocabulary.length)];

correct=current.meaning;

questionText="What is the meaning of '"+current.word+"'?";

options=[correct];

while(options.length<4){

let random=vocabulary[Math.floor(Math.random()*vocabulary.length)].meaning;

if(!options.includes(random))
options.push(random);
}
}

if(mode==='grammar'){

const current=grammarQuestions[Math.floor(Math.random()*grammarQuestions.length)];

correct=current.answer;

questionText=current.question;

options=[...current.options];
}

options=shuffle(options);

document.getElementById("question").innerText=questionText;

const answersDiv=document.getElementById("answers");

answersDiv.innerHTML="";

options.forEach(opt=>{

const btn=document.createElement("button");

btn.classList.add("answer-btn");

btn.innerText=opt;

btn.onclick=()=>selectAnswer(opt,correct);

answersDiv.appendChild(btn);

});

resetTimer();
}

function selectAnswer(selected,correct){

if(selected===correct){

score+=100;

if(score%500===0)
level++;
}

else{
alert("Wrong! Correct answer: "+correct);
}

document.getElementById("score").innerText=score;

document.getElementById("level").innerText=level;

nextQuestion();
}

function resetTimer(){

clearInterval(timer);

timeLeft=15;

updateTimerBar();

timer=setInterval(()=>{

timeLeft--;

updateTimerBar();

if(timeLeft<=0){

clearInterval(timer);

nextQuestion();
}

},1000);
}

function updateTimerBar(){

document.getElementById("timerBar").style.width=
(timeLeft/15)*100+"%";
}

</script>

</body>
</html>
